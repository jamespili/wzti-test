<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZTI 职场暗黑人格图鉴</title>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f7f7f8;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-border-primary: #000000;
  --color-border-secondary: #e5e5e5;
  --color-border-tertiary: #f0f0f0;
  --border-radius-md: 12px;
  --border-radius-lg: 24px;
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background-color: #fafafa; color: var(--color-text-primary); }
#app { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; min-height: 100vh;}

.screen { display: none; animation: fadeIn 0.4s ease-out; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.hero { text-align: center; padding: 4rem 1rem; background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 1px solid var(--color-border-tertiary); box-shadow: 0 4px 20px rgba(0,0,0,0.03);}
.hero-badge { display: inline-block; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); border-radius: 999px; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); padding: 6px 16px; margin-bottom: 1.5rem; letter-spacing: 0.5px;}
.hero h1 { font-size: 32px; font-weight: 700; color: var(--color-text-primary); line-height: 1.4; margin-bottom: 1rem; }
.hero p { font-size: 15px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 2.5rem; }
.start-btn { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: 999px; font-size: 16px; padding: 14px 40px; cursor: pointer; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }

.progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin: 1rem 0 2rem 0; overflow: hidden;}
.progress-fill { height: 100%; background: var(--color-text-primary); border-radius: 2px; transition: width 0.4s ease; }
.q-meta { display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 1rem; }
.q-text { font-size: 20px; font-weight: 600; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 0.5rem; }
.q-hint { font-size: 14px; color: #888; margin-bottom: 2rem; }
.opts { display: flex; flex-direction: column; gap: 12px; }
.opt-btn { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 16px 20px; text-align: left; cursor: pointer; font-size: 15px; font-weight: 500; color: var(--color-text-primary); transition: all 0.2s; line-height: 1.5;}
.opt-btn:hover { background: var(--color-background-secondary); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.04);}

.result-card { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 8px 30px rgba(0,0,0,0.04);}
.result-header { padding: 3rem 2rem 2rem; text-align: center;}
.result-tag { font-size: 14px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px;}
.result-code { font-size: 56px; font-weight: 800; letter-spacing: 2px; margin-bottom: 0.5rem; line-height: 1;}
.result-name { font-size: 24px; font-weight: 700; margin-bottom: 1.5rem; }
.result-desc { font-size: 15px; line-height: 1.8; color: var(--color-text-secondary); margin-bottom: 1.5rem; text-align: justify;}

.poster-box { margin: 1.5rem 0; padding: 1.5rem; background: #f9f9fb; border-radius: var(--border-radius-md); border-left: 4px solid var(--color-text-primary); text-align: center;}
.poster-title { font-size: 14px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 6px;}
.poster-img { max-width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

/* 新增的内部OS样式 */
.result-body { padding: 2rem; border-top: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary);}
.inner-voice-box { background: var(--color-background-primary); border: 1px dashed #ccc; border-radius: var(--border-radius-md); padding: 1.5rem 1.5rem 2rem; position: relative; text-align: center;}
.inner-voice-title { font-size: 13px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px;}
.inner-voice-text { font-size: 16px; line-height: 1.6; color: var(--color-text-primary); font-weight: 500;}
.inner-voice-text::before { content: '“'; font-size: 32px; color: #e0e0e0; font-family: serif; position: absolute; top: 2.5rem; left: 1rem;}
.inner-voice-text::after { content: '”'; font-size: 32px; color: #e0e0e0; font-family: serif; position: absolute; bottom: 0.5rem; right: 1rem;}

.retry-btn { width: 100%; border: 1px solid var(--color-text-primary); border-radius: 999px; background: transparent; font-size: 16px; font-weight: 600; color: var(--color-text-primary); padding: 14px; cursor: pointer; transition: all 0.2s; }
.retry-btn:hover { background: var(--color-text-primary); color: #fff; }

.tag-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
.tag { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; background: #f0f0f0; color: var(--color-text-primary); }
</style>
</head>
<body>

<div id="app">
  <div class="screen active" id="home-screen">
    <div class="hero">
      <div class="hero-badge">WZTI · 职场阴暗面</div>
      <h1>发现你的<br>打工人格</h1>
      <p>抛弃职场虚伪滤镜<br>测测你在公司真实的“生存状态”</p>
      <button class="start-btn" onclick="startTest()">开始测试 →</button>
    </div>
  </div>

  <div class="screen" id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="q-meta">
      <span id="q-num">第 1 题</span>
      <span id="q-total">共 20 题</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="opts" id="opts"></div>
  </div>

  <div class="screen" id="result-screen">
    <div class="result-card">
      <div class="result-header" id="r-header"></div>
      <div class="result-body" id="r-body"></div>
    </div>
    <button class="retry-btn" onclick="restart()">我不服，再测一次</button>
  </div>
</div>

<script>
const questions = [
  { text: "每天早上，你是怎么起床的？", opts: [{text: "闹钟响第一声就弹射起步，洗漱时甚至还在构思今天的待办事项", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "设置了8个连环闹钟，在最后一个的死亡边缘疯狂试探才痛苦爬起", scores: {勤奋: 0, 摸鱼: 2, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "根本没睡踏实，脑子里全是被工作支配的恐惧，熬到天亮自然醒", scores: {勤奋: 1, 摸鱼: 0, 社恐: 0, 务虚: 2, 内耗: 3}}, {text: "每天都在床上进行5分钟的灵魂拷问：打卡系统是不是反人类的发明？", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 1, 内耗: 0}}] },
  { text: "老板突然走过来，你的第一反应是？", opts: [{text: "肌肉记忆发作，Alt+Tab光速切换到写满密密麻麻文字的文档", scores: {勤奋: 0, 摸鱼: 3, 社恐: 1, 务虚: 0, 内耗: 0}}, {text: "虽然什么坏事都没做，但心跳瞬间飙升到120，开始疯狂反思自己", scores: {勤奋: 0, 摸鱼: 0, 社恐: 2, 务虚: 0, 内耗: 3}}, {text: "无所畏惧，甚至主动迎上目光，见缝插针地汇报一下自己的工作进度", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "眉头紧锁，眼神失焦，假装正在进行极其深度的宏观战略思考", scores: {勤奋: 0, 摸鱼: 1, 社恐: 1, 务虚: 3, 内耗: 1}}] },
  { text: "公司组织团建，你的心理活动是？", opts: [{text: "太棒了！终于有机会和跨部门的同事破冰交流，展示我的社交魅力！", scores: {勤奋: 1, 摸鱼: 0, 社恐: 0, 务虚: 2, 内耗: 0}}, {text: "只关心三个核心问题：占用周末吗？能折算成工资吗？可以不去吗？", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "提前半个月就开始搜集各种无懈可击的请假理由，甚至想伪造病历", scores: {勤奋: 0, 摸鱼: 0, 社恐: 3, 务虚: 0, 内耗: 2}}, {text: "肉体去了，灵魂没去。找个角落疯狂干饭，全程不发一言，准点消失", scores: {勤奋: 0, 摸鱼: 0, 社恐: 2, 务虚: 0, 内耗: 3}}] },
  { text: "开会的时候，你通常在做什么？", opts: [{text: "全神贯注，认真记录老板说的每一句废话，并试图揣摩背后的深意", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "表面看着PPT，实际上已经在笔记本上画完了整个动物园", scores: {勤奋: 0, 摸鱼: 2, 社恐: 1, 务虚: 1, 内耗: 0}}, {text: "眼神空洞地盯着前方，大脑正全力运算今晚下班到底吃火锅还是烤肉", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "根本没听别人说什么，全在脑内反复鞭尸自己刚才发言时的一个口误", scores: {勤奋: 0, 摸鱼: 0, 社恐: 1, 务虚: 0, 内耗: 3}}] },
  { text: "同事问你“能帮我一个忙吗”，你的回答是？", opts: [{text: "“没问题！交给我吧！”（语气真诚，甚至觉得这是证明自己的机会）", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "“好的没问题……”（微笑着答应，心里已经在疯狂流泪和骂娘）", scores: {勤奋: 1, 摸鱼: 0, 社恐: 2, 务虚: 0, 内耗: 3}}, {text: "警觉地反问：“具体是什么事？大概需要多久？”先评估风险再决定", scores: {勤奋: 1, 摸鱼: 2, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "戴上降噪耳机，死死盯住屏幕，进入一种“听不见看不见”的物理隔绝状态", scores: {勤奋: 0, 摸鱼: 1, 社恐: 3, 务虚: 0, 内耗: 1}}] },
  { text: "收到不合理的需求，你会？", opts: [{text: "什么也不说，默默扛下所有，即使加班到半夜也要把它做完", scores: {勤奋: 2, 摸鱼: 0, 社恐: 2, 务虚: 0, 内耗: 2}}, {text: "立刻打开文档，洋洋洒洒写下800字有理有据的驳回邮件", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 2, 内耗: 1}}, {text: "嘴上说着“好的好的”，实际上随手扔进待办列表最底层，主打一个拖字诀", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "一边机械地敲键盘，一边在心里默念：“等拿到年终奖我立刻就走”", scores: {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}] },
  { text: "公司群@所有人，你的第一反应是？", opts: [{text: "条件反射般点开，并在三秒内回复“收到！老板辛苦了！”", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "看见了，但只要没@我名字，就当作无事发生，选择性失明", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "心里“咯噔”一下，手心冒汗，生怕是自己负责的项目出了什么大娄子", scores: {勤奋: 0, 摸鱼: 0, 社恐: 1, 务虚: 0, 内耗: 3}}, {text: "绝不做出头鸟，默默等前面有三个人回复了，自己再复制粘贴跟队形", scores: {勤奋: 0, 摸鱼: 1, 社恐: 2, 务虚: 0, 内耗: 1}}] },
  { text: "你的电脑桌面是？", opts: [{text: "极度整洁，文件夹严格按照“日期-项目-状态”的规则分类排列", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "乱七八糟，但在这种混沌中我能精准找到3个月前的某张截图", scores: {勤奋: 1, 摸鱼: 2, 社恐: 0, 务虚: 2, 内耗: 0}}, {text: "密密麻麻铺满了各种临时文件、草稿和报错截图，看着就让人窒息", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}, {text: "极简主义，就一张壁纸，所有文件都在云端，随时准备提桶跑路", scores: {勤奋: 0, 摸鱼: 3, 社恐: 1, 务虚: 1, 内耗: 0}}] },
  { text: "快下班了，但突然来了个紧急任务，你会？", opts: [{text: "立刻放下包，重新打开电脑，责任心不允许我把今天的事拖到明天", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "试探性地问一句：“这个急吗？如果明天一早给您会影响进度吗？”", scores: {勤奋: 1, 摸鱼: 2, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "默默坐回工位，但内心的怒火已经把整个公司连同老板烧了三遍", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}, {text: "完美运用“下班瞎”技能，装作没看到消息，第二天早上再说“刚看到”", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}] },
  { text: "年会抽奖，你的心态是？", opts: [{text: "积极参与每一个互动环节，真心觉得今年自己能中个大奖", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 2, 内耗: 0}}, {text: "毫无波澜，甚至懒得扫码，反正从小到大连“再来一瓶”都没中过", scores: {勤奋: 0, 摸鱼: 2, 社恐: 1, 务虚: 0, 内耗: 2}}, {text: "在心里疯狂祈祷：“千万别抽中我！我绝对不想上台面对那么多人！”", scores: {勤奋: 0, 摸鱼: 0, 社恐: 3, 务虚: 0, 内耗: 1}}, {text: "抽不抽奖无所谓，我已经在算阳光普照奖的破锅挂闲鱼能卖多少钱了", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 1, 内耗: 0}}] },
  { text: "HR问你“你对这份工作有什么期望”，你的真实想法是？", opts: [{text: "“钱多、事少、离家近，不要画饼，不要PUA。”（但在心里说）", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "“希望能在一个有挑战性的平台上，实现个人价值和公司业绩的双赢。”", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "“希望工作环境简单点，别有那么多破会，让我安安静静敲代码就行。”", scores: {勤奋: 0, 摸鱼: 1, 社恐: 2, 务虚: 0, 内耗: 2}}, {text: "“我只想知道你们这公司财务状况健康吗？能不能撑过今年？”", scores: {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 3, 内耗: 2}}] },
  { text: "下班后，你通常会？", opts: [{text: "打开行业网站或网课，抓紧时间给自己充电，生怕被时代淘汰", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "像一具没有灵魂的尸体一样瘫在沙发上，连呼吸都觉得是在消耗能量", scores: {勤奋: 0, 摸鱼: 2, 社恐: 1, 务虚: 0, 内耗: 2}}, {text: "报复性熬夜刷手机，看搞笑视频到凌晨3点，虽然很困但就是不想睡", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "躺在床上，满脑子都是白天同事的某个眼神或领导的叹气，越想越焦虑", scores: {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}] },
  { text: "领导发来消息：“方便的时候来一下”，你的感受是？", opts: [{text: "拿起笔记本和笔立刻起身，心想肯定是有新的重要项目要交给我", scores: {勤奋: 2, 摸鱼: 1, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "大脑瞬间高频检索：我最近三天做错了什么？考勤异常了？客户投诉了？", scores: {勤奋: 0, 摸鱼: 0, 社恐: 1, 务虚: 0, 内耗: 3}}, {text: "故意等个十分钟再去，不能显得太卑微，得掌握一点职场节奏", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 1, 内耗: 0}}, {text: "一边走，一边已经在脑内推演了三种不同的灾难性谈话场景及应对策略", scores: {勤奋: 1, 摸鱼: 0, 社恐: 0, 务虚: 3, 内耗: 2}}] },
  { text: "周五下午5:58，你的状态是？", opts: [{text: "电脑已关，包已背好，手指悬停在打卡按钮上，随时准备百米冲刺", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "还在聚精会神地处理工作，只要活没干完，星期几对我来说没区别", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "死死盯着右下角的时钟，这最后的120秒，感觉比我人生的前20年还要漫长", scores: {勤奋: 0, 摸鱼: 1, 社恐: 0, 务虚: 0, 内耗: 3}}, {text: "人还在工位，灵魂已经飘到了今晚聚餐的烧烤摊上，正在思考点几串羊肉", scores: {勤奋: 0, 摸鱼: 2, 社恐: 1, 务虚: 2, 内耗: 0}}] },
  { text: "你如何看待“职场PUA”？", opts: [{text: "“我不仅听过，我每天都在亲身经历，并且已经习惯了这种打压。”", scores: {勤奋: 0, 摸鱼: 0, 社恐: 1, 务虚: 0, 内耗: 3}}, {text: "“完全免疫。只要我不把公司当家，老板的任何PUA对我来说都是耳旁风。”", scores: {勤奋: 1, 摸鱼: 2, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "“唉，这年头哪有不PUA的公司，为了碎银几两，只能咬咬牙忍了。”", scores: {勤奋: 1, 摸鱼: 0, 社恐: 2, 务虚: 1, 内耗: 2}}, {text: "“我专门建了个文件夹，随时截图录音收集证据，反向拿捏老板。”", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 3, 内耗: 1}}] },
  { text: "你最常用的工作表情包是？", opts: [{text: "从不用表情包，全部使用冷冰冰的纯文字，或者自带的系统表情 [微笑]", scores: {勤奋: 2, 摸鱼: 0, 社恐: 1, 务虚: 2, 内耗: 1}}, {text: "收藏了各种“好的好的”“老板辛苦了”，用来掩饰内心的波澜和无语", scores: {勤奋: 1, 摸鱼: 0, 社恐: 2, 务虚: 0, 内耗: 3}}, {text: "最爱用 [狗头]、[抱拳] 或者一些模棱两可的表情，主打一个圆滑不背锅", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "私聊列表里全是各种发疯、打砸抢烧、阴阳怪气的表情包，在封号边缘试探", scores: {勤奋: 0, 摸鱼: 1, 社恐: 0, 务虚: 0, 内耗: 3}}] },
  { text: "你的工位上有什么？", opts: [{text: "只有电脑和公司配的文具，干净得像个随时可以被替换的工业零件", scores: {勤奋: 2, 摸鱼: 1, 社恐: 2, 务虚: 0, 内耗: 0}}, {text: "堆积如山的文件、三个没洗的咖啡杯、还有不知道什么时候掉的饼干渣", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}, {text: "手办、盲盒、多肉植物、各种解压玩具，把工位硬生生装修成了次卧", scores: {勤奋: 0, 摸鱼: 2, 社恐: 0, 务虚: 3, 内耗: 0}}, {text: "什么个人物品都没有，抽屉空空如也，连水杯都是一次性的，随时跑路", scores: {勤奋: 0, 摸鱼: 3, 社恐: 1, 务虚: 0, 内耗: 1}}] },
  { text: "你认为“努力工作”的意义是？", opts: [{text: "通过解决复杂问题获得成就感，并在职业生涯中留下浓墨重彩的一笔", scores: {勤奋: 3, 摸鱼: 0, 社恐: 0, 务虚: 2, 内耗: 0}}, {text: "就是一场公平的交易：我出卖时间和精力，换取生存所需的货币，仅此而已", scores: {勤奋: 1, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}, {text: "害怕被别人看不起，害怕被淘汰，努力是为了维持一种“我很正常”的假象", scores: {勤奋: 1, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}, {text: "这是一个深刻的哲学问题，我现在每天摸鱼的时间都在思考这个，目前没答案", scores: {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 3, 内耗: 2}}] },
  { text: "如果可以，你最想在公司里拥有的超能力是？", opts: [{text: "瞬间完成所有任务的技能（这样我就能有更多时间去做...更多的任务！）", scores: {勤奋: 3, 摸鱼: 1, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "绝对的隐身术。只要没人能看到我，就不会有任何人来烦我、给我派活", scores: {勤奋: 0, 摸鱼: 2, 社恐: 3, 务虚: 0, 内耗: 0}}, {text: "百分之百的读心术。我想知道老板的饼是不是真的，同事是不是在背地骂我", scores: {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 3, 内耗: 2}}, {text: "让时间局部停止的能力。在每天早上的闹钟响和开无聊长会时，我太需要了", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 2}}] },
  { text: "最后一题：看到这是最后一题，你的感受是？", hint: "（请诚实作答，这道题很关键）", opts: [{text: "如释重负，赶紧交卷看看自己到底是哪种奇葩，希望能准一点", scores: {勤奋: 0, 摸鱼: 2, 社恐: 0, 务虚: 0, 内耗: 1}}, {text: "内心毫无波澜，这种测试做过几百个了，也就是个打发上班时间的乐子", scores: {勤奋: 1, 摸鱼: 1, 社恐: 0, 务虚: 2, 内耗: 0}}, {text: "陷入沉思：我刚才第7题是不是选得太保守了？结果会不会不准确？要重做吗？", scores: {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}}, {text: "非常满意，因为做这20道题成功帮我消耗了大约8分钟的带薪工作时间", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 0, 内耗: 0}}] }
];

// 新增了 quote 字段，用来输出每个打工人的内心独白
const types = [
  { code: "SHIT", name: "狗屎人", color: "#795548", desc: "干啥啥不行，坏事第一名。你走过的地方，代码会崩溃，饮水机会断水。你是职场中移动的“逻辑黑洞”。", tags: ["职场瘟神", "逻辑粉碎机", "搅屎棍"], img: "SHIT.png", quote: "我也不想这样啊，但我敲的每一行代码都有它自己的想法。只要我不尴尬，崩溃的就是甲方。", cond: s => s.摸鱼 >= 18 && s.内耗 >= 18 },
  { code: "MALO", name: "吗喽", color: "#6D4C41", desc: "你就是一只听话的吗喽。给个香蕉就干活，不给香蕉就原地发疯。生活就是一场大型马戏团杂耍，你是那个最卖力的。", tags: ["吗喽文化", "听话好使", "眼神清澈的蠢"], img: "MALO.png", quote: "斯哈斯哈，老板给香蕉了，我敲敲敲敲敲！等下，香蕉怎么只有半根？不管了，先发个疯再说！", cond: s => s.勤奋 >= 18 && s.内耗 >= 18 },
  { code: "ATM2", name: "ATM机", color: "#00BCD4", desc: "你不是在上班，你是在给老板的法拉利众筹。你的每一滴汗水都化作了老板在马尔代夫的每一粒沙子。", tags: ["人肉提款机", "老板逆子", "无私奉献"], img: "ATM2.png", quote: "我是一块砖，哪里需要哪里搬；我是一棵韭，老板割完还能长。老板的帕拉梅拉，有我一个轮胎的功劳！", cond: s => s.务虚 >= 15 && s.勤奋 >= 15 && s.内耗 < 10 },
  { code: "DRUN-K", name: "酒鬼", color: "#7E57C2", desc: "不喝两口根本没法面对这些需求。你清醒的时候工作极差，喝醉了反而能写出完美的方案，因为这时候你也看不清甲方在说什么了。", tags: ["宿醉办公", "精神麻醉", "摇摇晃晃"], img: "DRUN-K).png", quote: "清醒的人在这个职场是活不下去的。这需求写得跟天书一样，不整两口我怎么跟甲方灵魂共振？", cond: s => s.摸鱼 >= 15 && s.务虚 >= 15 },
  { code: "WOC!", name: "握草人", color: "#009688", desc: "你的一生都在震惊中度过。老板发消息：WOC！同事甩锅：WOC！这种公司居然还没倒闭：WOC！", tags: ["捧场王", "情绪极化", "只会这一句"], img: "WOC!.png", quote: "除了『握草』，我已经丧失了其他语言能力。这破公司每天都能给我整点新花样，绝了。", cond: s => s.内耗 >= 15 && s.社恐 >= 15 },
  { code: "DEAD", name: "死者", color: "#000000", desc: "其实你三年前就心肌梗塞死在工位上了。现在的你只是由于长期吹空调产生的物理惯性在进行某种名为“打工”的反射。安息吧。", tags: ["魂归西天", "僵尸代码", "物理惯性"], img: "dead.png", quote: "如果工位能长出蘑菇，我头上大概已经是一片森林了。别吵，我在靠空调续命。", cond: s => s.内耗 === Math.max(...Object.values(s)) && s.内耗 >= 25 },
  { code: "FUCK", name: "草者", color: "#4CAF50", desc: "头顶绿草，心中全是草泥马。只要我不努力，老板就永远别想割到我的韭菜。你的存在就是为了让公司的绩效看起来像个笑话。", tags: ["原地躺平", "植物人状态", "拒绝被卷"], img: "FUCK.png", quote: "只要我不发力，资本家就剥削不到我。今天也是成功把公司羊毛薅秃的一天，嘿嘿。", cond: s => s.摸鱼 === Math.max(...Object.values(s)) && s.摸鱼 >= 25 },
  { code: "SOLO", name: "孤儿", color: "#212121", desc: "你没有同事，没有朋友。你所在的部门只有你一个人。你就像是公司里的一块瓷砖，存在感极低，但被踩得很疼。", tags: ["单机玩家", "全栈孤狼", "查无此人"], img: "SOLO.png", quote: "别跟我说话，别拉我进群，别叫我聚餐。代码和文档是我的结界，人类只会让我掉电。", cond: s => s.社恐 === Math.max(...Object.values(s)) && s.社恐 >= 20 },
  { code: "FAKE", name: "伪人", color: "#FFEB3B", desc: "你是一台完美的模仿机器。模仿在干活，模仿在开会，模仿在思考。除了想下班的欲望是真的，其余一切都是假的。", tags: ["皮囊大师", "假装在线", "系统镜像"], img: "FAKE.png", quote: "『收到，好的，没问题』——已触发自动回复机制。面具戴久了，我都忘了自己本来到底想骂什么。", cond: s => s.务虚 === Math.max(...Object.values(s)) && s.务虚 >= 20 },
  { code: "IMSB", name: "自我攻击者", color: "#607D8B", desc: "老板还没开口，你已经把自己骂得体无完肤。你不是在内耗，你是在体内举办自己的葬礼，顺便还给自己烧了纸。", tags: ["自卑巅峰", "道歉机器", "内心火葬场"], img: "IMSB.png", quote: "对不起，我又呼吸了公司的空气。刚刚老板皱眉肯定是因为我昨天左脚先踏进公司，都是我的错…", cond: s => s.内耗 === Math.max(...Object.values(s)) },
  { code: "ZZZZ", name: "装死者", color: "#BDBDBD", desc: "只要我躺得够平，老板的鞭子就永远抽不到我。任何紧急任务，只要我装死够久，它就会自动顺延给那个叫SADG的倒霉蛋。", tags: ["由于太闲而忙碌", "假装断网", "生存大师"], img: "ZZZZ.png", quote: "敌不动我不动，敌一动我装死。只要我已读不回的时间够长，这活儿就会奇迹般地消失。", cond: s => s.摸鱼 === Math.max(...Object.values(s)) },
  { code: "ATM1", name: "送钱者", color: "#FF5252", desc: "你上班不是为了赚钱，是为了把医保扣完。你每个月发的工资最后都通过打车费和药费还给了社会，你是职场慈善家。", tags: ["纯纯倒贴", "用命换钱", "感动中国"], img: "ATM1.png", quote: "打车50，外卖40，买药100……算下来今天来上班我还倒贴了60。没关系，全当是做慈善了。", cond: s => s.勤奋 === Math.max(...Object.values(s)) && s.内耗 < 10 },
  { code: "Dior-s", name: "屌丝", color: "#8D6E63", desc: "虽然自称职场精英，但内心深处知道自己只是一抹顽强的尘埃。便宜、好用、随叫随到，是你最后的倔强。", tags: ["底层本色", "自嘲之王", "职场底片"], img: "Dior-s.png", quote: "虽然每天吃着十几块的快餐，但我操心的都是公司几百万的项目。我就是职场中最坚韧的边角料！", cond: s => s.勤奋 === Math.max(...Object.values(s)) },
  { code: "OJB-K", name: "无所谓人", color: "#FF9800", desc: "你已经超脱了。老板骂你你点头，同事卷你你退休。你不是心态好，你是已经对这个世界彻底失望了。", tags: ["随波逐流", "无欲无求", "活着就行"], img: "OJB-K.png", quote: "扣绩效？OK。加班？OK。背锅？OK。随你们便吧，我这具躯壳已经看透了职场的红尘。", cond: s => (s.勤奋 + s.内耗 + s.务虚) <= 15 },
  { code: "QUIT", name: "辞职狂热者", color: "#F44336", desc: "每天在心里辞职800次，写了500封辞职信从未点击发送。脚被房贷链条锁在桌腿上。", tags: ["口嗨专家", "精神离职", "准时下班"], img: "QUIT.png", quote: "辞职信已经写到第500个版本了。如果不是下个月的花呗和房贷，我发誓我现在就掀翻这张办公桌！", cond: s => true }
];

let scores = {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0};
let current = 0;

function startTest() {
  scores = {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0};
  current = 0;
  showQ();
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
}

function showQ() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `第 ${current + 1} 题`;
  document.getElementById('q-total').textContent = `共 ${questions.length} 题`;
  document.getElementById('prog').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint || '';
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o.text;
    b.onclick = () => pick(i);
    opts.appendChild(b);
  });
}

function pick(i) {
  const s = questions[current].opts[i].scores;
  Object.keys(s).forEach(k => scores[k] += s[k]);
  current++;
  if (current >= questions.length) showResult(); else showQ();
}

function showResult() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  const type = types.find(t => t.cond(scores));

  document.getElementById('r-header').innerHTML = `
    <div class="result-tag">你的打工人格类型</div>
    <div class="result-code" style="color:${type.color}">${type.code}</div>
    <div class="result-name">${type.name}</div>
    <div class="result-desc">${type.desc}</div>
    <div class="tag-row">${type.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    
    <div class="poster-box" style="border-left-color: ${type.color}">
      <div class="poster-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        你的职场灵魂画像
      </div>
      <img src="${type.img}" alt="${type.name}" class="poster-img">
    </div>
  `;

  // 移除了进度条代码，替换为内心OS的渲染逻辑
  document.getElementById('r-body').innerHTML = `
    <div class="inner-voice-box">
      <div class="inner-voice-title">你的职场内心 OS</div>
      <div class="inner-voice-text">${type.quote}</div>
    </div>
  `;
}

function restart() {
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('home-screen').classList.add('active');
}
</script>
