<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZTI 职场暗黑人格图鉴</title>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f7f7f8;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666666;
  --color-border-primary: #000000;
  --color-border-secondary: #e5e5e5;
  --color-border-tertiary: #f0f0f0;
  --border-radius-md: 12px;
  --border-radius-lg: 24px;
  --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background-color: #fafafa; color: var(--color-text-primary); }
#app { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; min-height: 100vh;}

.screen { display: none; animation: fadeIn 0.4s ease-out; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.hero { text-align: center; padding: 4rem 1rem; background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 1px solid var(--color-border-tertiary); box-shadow: 0 4px 20px rgba(0,0,0,0.03);}
.hero-badge { display: inline-block; background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); border-radius: 999px; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); padding: 6px 16px; margin-bottom: 1.5rem; letter-spacing: 0.5px;}
.hero h1 { font-size: 32px; font-weight: 700; color: var(--color-text-primary); line-height: 1.4; margin-bottom: 1rem; }
.hero p { font-size: 15px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 2.5rem; }
.start-btn { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: 999px; font-size: 16px; padding: 14px 40px; cursor: pointer; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }

.progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin: 1rem 0 2rem 0; overflow: hidden;}
.progress-fill { height: 100%; background: var(--color-text-primary); border-radius: 2px; transition: width 0.4s ease; }
.q-meta { display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 1rem; }
.q-text { font-size: 20px; font-weight: 600; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 0.5rem; }
.q-hint { font-size: 14px; color: #888; margin-bottom: 2rem; }
.opts { display: flex; flex-direction: column; gap: 12px; }
.opt-btn { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 16px 20px; text-align: left; cursor: pointer; font-size: 15px; font-weight: 500; color: var(--color-text-primary); transition: all 0.2s; }
.opt-btn:hover { background: var(--color-background-secondary); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.04);}

.result-card { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 8px 30px rgba(0,0,0,0.04);}
.result-header { padding: 3rem 2rem 2rem; text-align: center;}
.result-tag { font-size: 14px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px;}
.result-code { font-size: 56px; font-weight: 800; letter-spacing: 2px; margin-bottom: 0.5rem; line-height: 1;}
.result-name { font-size: 24px; font-weight: 700; margin-bottom: 1.5rem; }
.result-desc { font-size: 15px; line-height: 1.8; color: var(--color-text-secondary); margin-bottom: 1.5rem; text-align: justify;}

.poster-box { margin: 1.5rem 0; padding: 1.5rem; background: #f9f9fb; border-radius: var(--border-radius-md); border-left: 4px solid var(--color-text-primary); text-align: left;}
.poster-title { font-size: 14px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 6px;}
.poster-desc { font-size: 14px; line-height: 1.6; color: var(--color-text-secondary); font-style: italic;}

.result-body { padding: 2rem; border-top: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary);}
.dim-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.dim-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); width: 40px; flex-shrink: 0; }
.dim-track { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 4px; transition: width 1s; }
.dim-val { font-size: 13px; font-weight: 600; color: var(--color-text-primary); width: 24px; text-align: right; }

.retry-btn { width: 100%; border: 1px solid var(--color-text-primary); border-radius: 999px; background: transparent; font-size: 16px; font-weight: 600; color: var(--color-text-primary); padding: 14px; cursor: pointer; transition: all 0.2s; }
.retry-btn:hover { background: var(--color-text-primary); color: #fff; }

.tag-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
.tag { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; background: #f0f0f0; color: var(--color-text-primary); }
</style>
</head>
<body>

<div id="app">
  <div class="screen active" id="home-screen">
    <div class="hero">
      <div class="hero-badge">WZTI · 职场阴暗面</div>
      <h1>发现你的<br>打工人格 V2.0</h1>
      <p>抛弃职场虚伪滤镜<br>测测你在老板眼里的“真实”模样</p>
      <button class="start-btn" onclick="startTest()">开始测试 →</button>
    </div>
  </div>

  <div class="screen" id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="q-meta">
      <span id="q-num">第 1 题</span>
      <span id="q-total">共 20 题</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="opts" id="opts"></div>
  </div>

  <div class="screen" id="result-screen">
    <div class="result-card">
      <div class="result-header" id="r-header"></div>
      <div class="result-body">
        <div id="dims-list"></div>
      </div>
    </div>
    <button class="retry-btn" onclick="restart()">我不服，再测一次</button>
  </div>
</div>

<script>

      {text: "设置了8个连环闹钟，在最后一个的死亡边缘疯狂试探才痛苦爬起", scores: {勤奋: 0, 摸鱼: 2, 社恐: 0, 务虚: 0, 内耗: 1}},

      {text: "每天都在床上进行5分钟的灵魂拷问：打卡系统是不是反人类的发明？", scores: {勤奋: 0, 摸鱼: 3, 社恐: 0, 务虚: 1, 内耗: 0}}
    ] 
  },
  {

      {text: "眉头紧锁，眼神失焦，假装正在进行极其深度的宏观战略思考", scores: {勤奋: 0, 摸鱼: 1, 社恐: 1, 务虚: 3, 内耗: 1}}

      {text: "心里“咯噔”一下，手心冒汗，生怕是自己负责的项目出了什么大娄子", scores: {勤奋: 0, 摸鱼: 0, 社恐: 1, 务虚: 0, 内耗: 3}}, 
      {text: "绝不做出头鸟，默默等前面有三个人回复了，自己再复制粘贴跟队形", scores: {勤奋: 0, 摸鱼: 1, 社恐: 2, 务虚: 0, 内耗: 1}}

      {text: "密密麻麻铺满了各种临时文件、草稿和报错截图，看着就让人窒息", scores: {勤奋: 2, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 3}},

let scores = {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0};
let current = 0;

function startTest() {
  scores = {勤奋: 0, 摸鱼: 0, 社恐: 0, 务虚: 0, 内耗: 0};
  current = 0;
  showQ();
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
}

function showQ() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `第 ${current + 1} 题`;
  document.getElementById('q-total').textContent = `共 ${questions.length} 题`;
  document.getElementById('prog').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint || '';
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o.text;
    b.onclick = () => pick(i);
    opts.appendChild(b);
  });
}

function pick(i) {
  const s = questions[current].opts[i].scores;
  Object.keys(s).forEach(k => scores[k] += s[k]);
  current++;
  if (current >= questions.length) showResult(); else showQ();
}

function showResult() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  const type = types.find(t => t.cond(scores));
  const maxScore = Math.max(...Object.values(scores)) || 1;
  const dimColors = {勤奋: '#378ADD', 摸鱼: '#5DCAA5', 社恐: '#AFA9EC', 务虚: '#EF9F27', 内耗: '#F09595'};

  document.getElementById('r-header').innerHTML = `
    <div class="result-tag">你的打工人格类型</div>
    <div class="result-code" style="color:${type.color}">${type.code}</div>
    <div class="result-name">${type.name}</div>
    <div class="result-desc">${type.desc}</div>
    <div class="tag-row">${type.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="poster-box" style="border-left-color: ${type.color}">
      <div class="poster-title">16Personalities 画风灵感</div>
      <div class="poster-desc">${type.poster}</div>
    </div>
  `;

  document.getElementById('dims-list').innerHTML = Object.entries(scores).map(([k, v]) => `
    <div class="dim-row">
      <span class="dim-label">${k}</span>
      <div class="dim-track"><div class="dim-fill" style="width:${Math.round(v/maxScore*100)}%;background:${dimColors[k]}"></div></div>
      <span class="dim-val">${v}</span>
    </div>
  `).join('');
}

function restart() {
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('home-screen').classList.add('active');
}
</script>
